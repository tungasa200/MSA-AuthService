spring:
  profiles:
    active: local # default
    group:
      local:  # local, common profile을 그룹지어 함께 어플리케이션 구동
        - common
      dev:   # dev, common profile을 그룹지어 함께 어플리케이션 구동
        - common
      prod:   # prod, common profile을 그룹지어 함께 어플리케이션 구동
        - common

---
spring:
  config:
    activate:
      on-profile: common
  application:
    name: auth-service
server:
  port: 8085



---
spring:
  config:
    activate:
      on-profile: local
  # H2 콘솔 비활성화 (MySQL 사용)
  h2:
    console:
      enabled: false
  # 초기화 SQL 비활성화 (MySQL 사용)
  sql:
    init:
      mode: never
  redis:
    lettuce:
      pool.max-active: 10
      pool.max-idle: 10
      pool.min-idle: 2
    port: 6379
    host: localhost
    password:
    sessiontime: 3600000
    sessionUseYn: N
    keyprefix: LOCAL

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}


logging:
  file:
    path: "C:\\Temp\\"
    name: "auth"
  level:
    p6spy: info
  server:
    version: V1
    id: AUTH

jwt:
  header: Authorization
  system-secret: ${JWT_SECRET}
  token-validity-in-seconds: 3600  # 1시간
  refresh-token-validity-in-seconds: 2592000  # 30일

# 서브도메인 CORS/쿠키 설정
app:
  cors:
    allowed-origins: http://localhost:81,http://localhost:8085
  cookie:
    domain: localhost
    secure: false

# 언론사 정보 설정
media:
  configs:
    - media-id: ${MEDIA_ID}
      media-key: ${MEDIA_KEY}
      media-secret: ${MEDIA_SECRET}

# SNS OAuth2 프로바이더 설정
sns:
  providers:
    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET}
      authorization-uri: https://kauth.kakao.com/oauth/authorize
      token-uri: https://kauth.kakao.com/oauth/token
      user-info-uri: https://kapi.kakao.com/v2/user/me
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      authorization-uri: https://nid.naver.com/oauth2.0/authorize
      token-uri: https://nid.naver.com/oauth2.0/token
      user-info-uri: https://openapi.naver.com/v1/nid/me
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://www.googleapis.com/oauth2/v4/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
      scope: profile email
    facebook:
      client-id: ${FACEBOOK_CLIENT_ID}
      client-secret: ${FACEBOOK_CLIENT_SECRET}
      authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
      token-uri: https://graph.facebook.com/v18.0/oauth/access_token
      user-info-uri: https://graph.facebook.com/me?fields=id,email,name
      scope: email
  default-redirect-uri: http://localhost:81/sns/callback

# Service DB (ws/service 프로젝트 DB - MH_EXT_MEMBER 조회용)
service:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: jdbc:mysql://${SERVICE_DB_HOST}:${SERVICE_DB_PORT}/mediahub_srv?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${SERVICE_DB_USERNAME}
    password: ${SERVICE_DB_PASSWORD}
    maximum-pool-size: 5

spring-doc:
  packages-to-scan: com.yjmedia.yvisbig.baseauth
  default-consumes-media-type: application/json;charset=UTF-8
  swagger-ui:
    disable-swagger-default-url: true   #디폴트 페이지 안나오게
    path: swagger-ui.html            # Swagger UI 경로 => localhost:8000/demo-ui.html
    tags-sorter: alpha            # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
    operations-sorter: alpha      # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  cache:
    disabled: true

batch:
  sts:
    newmbrs: true

---
spring:
  config:
    activate:
      on-profile: dev
  redis:
    lettuce:
      pool.max-active: 10
      pool.max-idle: 10
      pool.min-idle: 2
    port: 6379
