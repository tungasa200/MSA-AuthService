spring:
  profiles:
    active: local # default
    group:
      local:  # local, common profile을 그룹지어 함께 어플리케이션 구동
        - common
      dev:   # dev, common profile을 그룹지어 함께 어플리케이션 구동
        - common
      prod:   # prod, common profile을 그룹지어 함께 어플리케이션 구동
        - common

---
spring:
  config:
    activate:
      on-profile: common
  application:
    name: auth-service
server:
  port: 8085



---
spring:
  config:
    activate:
      on-profile: local
  # 기본 datasource (auth 서버 자체 테이블용) - HikariCP 자동 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: jdbc:mysql://REMOVED_DB_HOST:30199/mediahub_srv?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: mediahub
    password: REMOVED_PASSWORD
    maximum-pool-size: 5
  # H2 콘솔 비활성화 (MySQL 사용)
  h2:
    console:
      enabled: false
  # 초기화 SQL 비활성화 (MySQL 사용)
  sql:
    init:
      mode: never
  redis:
    lettuce:
      pool.max-active: 10
      pool.max-idle: 10
      pool.min-idle: 2
    port: 6379
    host: localhost
    password:
    sessiontime: 3600000
    sessionUseYn: N
    keyprefix: LOCAL

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}


logging:
  file:
    path: "C:\\Temp\\"
    name: "auth"
  level:
    p6spy: info
  server:
    version: V1
    id: AUTH

jwt:
  header: Authorization
  system-secret: REMOVED_JWT_SECRET
  token-validity-in-seconds: 3600  # 1시간
  refresh-token-validity-in-seconds: 2592000  # 30일

# 언론사 정보 설정
media:
  configs:
    - media-id: YJMEDIA
      media-key: REMOVED_MEDIA_KEY
      media-secret: REMOVED_MEDIA_SECRET

# Service DB 연결 설정 (MH_USERS 조회용) - service와 동일한 DB 사용
service:
  datasource:
    enabled: true
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: jdbc:mysql://REMOVED_DB_HOST:30199/mediahub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: mediahub
    password: REMOVED_PASSWORD

spring-doc:
  packages-to-scan: com.yjmedia.yvisbig.baseauth
  default-consumes-media-type: application/json;charset=UTF-8
  swagger-ui:
    disable-swagger-default-url: true   #디폴트 페이지 안나오게
    path: swagger-ui.html            # Swagger UI 경로 => localhost:8000/demo-ui.html
    tags-sorter: alpha            # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
    operations-sorter: alpha      # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  cache:
    disabled: true

batch:
  sts:
    newmbrs: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    hikari:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://REMOVED_DB_HOST:3306/yvisbig_local?autoReconnect=true&useSSL=false&amp&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      username: dev
      password: REMOVED_PASSWORD
      maximum-pool-size: 10
  redis:
    lettuce:
      pool.max-active: 10
      pool.max-idle: 10
      pool.min-idle: 2
    port: 6379
    host: REMOVED_REDIS_HOST
    password: REMOVED_PASSWORD
    sessiontime: 3600000
    sessionUseYn: Y
    keyprefix: DEV

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

logging:
  file:
    path: "/opt/project_kdmp/msasvr_auth/logs"
    name: "auth"
  level:
    p6spy: info
  server:
    version: V1
    id: AUTH

jwt:
  header: Authorization
  system-secret: REMOVED_JWT_SECRET
  token-validity-in-seconds: 3600  # 1시간
  refresh-token-validity-in-seconds: 2592000  # 30일

# Service DB 연결 설정 (MH_USERS 조회용)
service:
  datasource:
    enabled: true
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: jdbc:mysql://REMOVED_DB_HOST:3306/gobgnews?autoReconnect=true&useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${SERVICE_DB_USERNAME:dev}
    password: ${SERVICE_DB_PASSWORD:asdf1234}

spring-doc:
  packages-to-scan: com.yjmedia.yvisbig.baseauth
  default-consumes-media-type: application/json;charset=UTF-8
  swagger-ui:
    disable-swagger-default-url: true   #디폴트 페이지 안나오게
    path: swagger-ui.html            # Swagger UI 경로 => localhost:8000/demo-ui.html
    tags-sorter: alpha            # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
    operations-sorter: alpha      # alpha: 알파벳 순 태그 정렬, method: HTTP Method 순 정렬
  api-docs:
    path: /api-docs/json
    groups:
      enabled: true
  cache:
    disabled: true

batch:
  sts:
    newmbrs: true

---
spring:
  config:
    activate:
      on-profile: prod
